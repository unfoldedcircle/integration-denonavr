[tool.ruff]
line-length = 120
target-version = "py311"
src = ["intg-denonavr", "tests"]
extend-exclude = ["build", "dist"]

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "F",      # pyflakes
    "B",      # flake8-bugbear
    "SIM",    # flake8-simplify
    "UP",     # pyupgrade
    "RUF",    # ruff-specific
    "S",      # flake8-bandit (security)
    "PL",     # pylint
    "TRY",    # tryceratops
    "PERF",   # perflint
    "ASYNC",  # flake8-async
    "I",      # isort
    "D",      # pydocstyle
    "N",      # pep8-naming
    "C4",     # flake8-comprehensions
    "RET",    # flake8-return
    "PTH",    # flake8-use-pathlib
    "G",      # flake8-logging-format
    "LOG",    # flake8-logging
    "PIE",    # flake8-pie
    "A",      # flake8-builtins
    "ARG",    # flake8-unused-arguments
]
ignore = [
    "D203",    # one-blank-line-before-class (conflicts with D211)
    "D213",    # multi-line-summary-second-line (conflicts with D212)
    "PLR0911", # too-many-return-statements
    "PLR0912", # too-many-branches
    "PLR0913", # too-many-arguments (mirrors existing pylint disable)
    "PLR0915", # too-many-statements
    "PLR2004", # magic-value-comparison (noisy)
    "PLW0603", # global-statement (mirrors existing pylint disable)
    "TRY003",  # raise-vanilla-args (very noisy)
    "TRY300",  # try-consider-else (noisy)
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101", "D", "ARG", "PLR2004", "N802"]

[tool.ruff.lint.pydocstyle]
convention = "pep257"

[tool.ruff.lint.isort]
known-first-party = [
    "avr",
    "command_constants",
    "config",
    "denon_remote",
    "denon_select",
    "discover",
    "driver",
    "entities",
    "helpers",
    "i18n",
    "media_player",
    "receiver",
    "sensor",
    "setup_flow",
    "simplecommand",
]

[tool.ruff.format]
line-ending = "auto"

[tool.pyright]
include = ["intg-denonavr"]
exclude = ["**/__pycache__", "build", "dist"]
extraPaths = ["intg-denonavr"]
# Standard venv name. Devs with custom venv names must override in their IDE.
venvPath = "."
venv = ".venv"
pythonVersion = "3.11"
typeCheckingMode = "strict"
reportMissingTypeStubs = false
useLibraryCodeForTypes = true
# Untyped 3rd-party deps (ucapi, denonavr) trigger Unknown cascades. Silence the noise.
reportUnknownVariableType = false
reportUnknownMemberType = false
reportUnknownArgumentType = false
reportUnknownParameterType = false
reportUnknownLambdaType = false
# Module-level state vars use UPPER_CASE by convention. Mutable globals not constants.
reportConstantRedefinition = false
